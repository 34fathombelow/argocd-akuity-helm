apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: addons/external-secrets
    repoURL: https://github.com/34fathombelow/argocd-akuity-helm.git
    targetRevision: HEAD
  syncPolicy:
    syncOptions:
      - Delete=confirm
      - ServerSideApply=true
